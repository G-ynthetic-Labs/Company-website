            <section>
                <h2 style="font-family: var(--font-header); letter-spacing: -1px; margin-bottom: 2rem;">The Human-Agent
                    Interface</h2>
                <p style="line-height: 1.8; color: var(--text-dim); margin-bottom: 2rem;">
                    The <code>vantageService</code> bridges the 512-cell board state and a Large Language Model
                    by constructing a piece-specific context packet before every query.
                    When a player selects a piece and opens dialogue, the system serializes that piece’s
                    3D coordinate, morale state, kill history, skill loadout, and local threat pressure
                    into a structured prompt. The LLM then responds in-character, speaking only from
                    the tactical perspective of that specific unit — not the board as a whole.
                </p>

                <div style="margin: 4rem 0;">

                            are you retreating"</p>

                        style="border-color: var(--accent-color); background: rgba(255, 107, 0, 0.02);">
                        <span class="chat-label">KNIGHT_X7 (SENSORY_DATA)</span>
                        <p style="font-size: 0.85rem; color: var(--text-main);">"My current axial coverage is failing.
                            My Morale is at 42% due to the loss of Bishop C3. I am repositioning to maintain the
                            defensive lattice."</p>
                    </div>
                </div>

                <div style="border: 1px solid var(--border-color); padding: 2rem; margin-top: 4rem;">
                    <h3
                        style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-color); margin-bottom: 1rem;">
                        // CONTEXT PACKET ASSEMBLY</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.7;">
                        This is the conceptual precursor to what G-ynthetic calls <em>Prelinguistic Inference</em>.
                        Rather than asking an LLM to interpret a situation from scratch, Vantage Chat pre-computes
                        the full structural context — coordinates, morale, threat vectors, allied layout — and
                        injects it as a governed prompt frame. The LLM renders language; the architecture governs
                        what that language can claim. The piece cannot lie about its position, because its position
                        is part of the prompt.
                    </p>
                </div>
